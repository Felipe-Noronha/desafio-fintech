spring.datasource.url=jdbc:postgresql://postgres-db:5432/desafio_db
spring.datasource.username=postgres
spring.datasource.password=123

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.show-sql=false

logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example.desafio=INFO

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.security.enabled=false 

spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=desafio-fintech-group

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.desafio.dto

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

api.security.token.secret=secret-key-gateway-pagamentos